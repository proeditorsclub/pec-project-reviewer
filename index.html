<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEC Project Reviewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    background: #111; border-right: 1px solid #222;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid #222;
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .sidebar-header p { font-size: 12px; color: #666; }

  .paste-area {
    padding: 12px 16px;
    border-bottom: 1px solid #222;
  }
  .paste-area textarea {
    width: 100%; height: 80px; padding: 10px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
    color: #ccc; font-size: 12px; font-family: monospace;
    resize: vertical; outline: none;
  }
  .paste-area textarea:focus { border-color: #4f8cff; }
  .paste-area textarea::placeholder { color: #444; }

  .paste-actions {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .btn {
    padding: 8px 14px; border-radius: 6px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: #4f8cff; color: #fff; flex: 1; }
  .btn-primary:hover { background: #3a7aff; }
  .btn-sm { background: #222; color: #888; }
  .btn-sm:hover { background: #333; color: #ccc; }
  .btn-danger { background: #2a1515; color: #e55; }
  .btn-danger:hover { background: #3a1a1a; color: #f66; }

  .queue-header {
    padding: 12px 16px 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .queue-header span { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .queue-stats { font-size: 11px; color: #4f8cff; }

  .queue {
    flex: 1; overflow-y: auto; padding: 0 8px 12px;
  }
  .queue::-webkit-scrollbar { width: 4px; }
  .queue::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .queue-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 10px; margin-bottom: 2px;
    border-radius: 8px; cursor: pointer;
    transition: all 0.15s; position: relative;
  }
  .queue-item:hover { background: #1a1a1a; }
  .queue-item.active { background: #1a2a3a; }
  .queue-item.loading { opacity: 0.7; }
  .queue-item.error { opacity: 0.5; }

  .q-status {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .q-status.loading { background: #1a2a3a; }
  .q-status.ready { background: #1a3a1a; }
  .q-status.playing { background: #4f8cff; }
  .q-status.error { background: #3a1a1a; }

  .q-info { flex: 1; min-width: 0; }
  .q-name {
    font-size: 13px; color: #ccc;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .q-meta { font-size: 11px; color: #555; margin-top: 2px; }

  .q-remove {
    background: none; border: none; color: #444; cursor: pointer;
    font-size: 14px; padding: 4px; border-radius: 4px;
    opacity: 0; transition: all 0.15s;
  }
  .queue-item:hover .q-remove { opacity: 1; }
  .q-remove:hover { color: #f44; }

  .main {
    display: flex; flex-direction: column;
    background: #0a0a0a;
  }

  .player-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; background: #000;
  }

  video {
    width: 100%; height: 100%;
    max-height: calc(100vh - 60px);
    object-fit: contain;
  }

  .empty-state {
    text-align: center; color: #333;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; color: #2a2a2a; }

  .player-bar {
    height: 60px; background: #111; border-top: 1px solid #222;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }
  .now-playing { font-size: 13px; color: #aaa; }
  .now-playing strong { color: #fff; }
  .player-nav { display: flex; gap: 8px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: #222; border: none; color: #aaa;
    font-size: 16px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: #333; color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .video-loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: center;
    display: none;
  }
  .video-loading.active { display: flex; }
  .vl-spinner {
    width: 40px; height: 40px;
    border: 3px solid #333; border-top-color: #4f8cff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .vl-text { font-size: 13px; color: #888; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { max-height: 40vh; }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>PEC Project Reviewer</h1>
      <p>Paste links → plays directly — no download wait</p>
    </div>

    <div class="paste-area">
      <textarea id="linkInput" placeholder="Paste one or more Tally links here (one per line)..."></textarea>
      <div class="paste-actions">
        <button class="btn btn-primary" onclick="addLinks()">Load All</button>
        <button class="btn btn-sm" onclick="document.getElementById('linkInput').value=''">Clear</button>
        <button class="btn btn-danger" onclick="clearQueue()">Reset All</button>
      </div>
    </div>

    <div class="queue-header">
      <span>Queue</span>
      <span class="queue-stats" id="queueStats">0 total</span>
    </div>

    <div class="queue" id="queueList"></div>
  </div>

  <div class="main">
    <div class="player-area" id="playerArea">
      <video id="videoPlayer" controls preload="auto" style="display:none;"></video>
      <div class="video-loading" id="videoLoading">
        <div class="vl-spinner"></div>
        <div class="vl-text" id="vlText">Loading video...</div>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="icon">▶</div>
        <p>Paste student project links on the left</p>
        <small>Videos play directly — no download wait</small>
      </div>
    </div>
    <div class="player-bar">
      <div class="now-playing" id="nowPlaying">No video selected</div>
      <div class="player-nav">
        <button class="nav-btn" onclick="playPrev()" id="prevBtn" disabled title="Previous">◀</button>
        <button class="nav-btn" onclick="playNext()" id="nextBtn" disabled title="Next (or press →)">▶</button>
      </div>
    </div>
  </div>
</div>

<script>
const queue = [];
let activeId = null;
let nextId = 0;

const videoPlayer = document.getElementById('videoPlayer');
const emptyState = document.getElementById('emptyState');
const videoLoading = document.getElementById('videoLoading');
const vlText = document.getElementById('vlText');

function extractName(url) {
  try {
    const path = new URL(url).pathname.split('/');
    return decodeURIComponent(path[path.length - 1]) || 'video';
  } catch { return 'video'; }
}

function addLinks() {
  const text = document.getElementById('linkInput').value.trim();
  if (!text) return;
  const urls = text.split('\n').map(l => l.trim()).filter(l => l.startsWith('http'));
  urls.forEach(url => {
    if (queue.find(q => q.url === url)) return;
    const item = { id: nextId++, url, name: extractName(url), status: 'ready' };
    queue.push(item);
  });
  document.getElementById('linkInput').value = '';
  renderQueue();
  updateNav();

  if (!activeId && queue.length > 0) {
    playItem(queue[0].id);
  }
}

function playItem(id) {
  const item = queue.find(q => q.id === id);
  if (!item) return;

  activeId = id;
  emptyState.style.display = 'none';
  videoLoading.className = 'video-loading active';
  vlText.textContent = 'Loading ' + item.name + '...';
  videoPlayer.style.display = 'block';

  videoPlayer.src = item.url;
  videoPlayer.load();
  videoPlayer.play().catch(() => {});

  videoPlayer.oncanplay = () => {
    videoLoading.className = 'video-loading';
    item.status = 'playing';
    renderQueue();
  };

  videoPlayer.onerror = () => {
    videoLoading.className = 'video-loading';
    item.status = 'error';
    renderQueue();
  };

  document.getElementById('nowPlaying').innerHTML = '<strong>' + item.name + '</strong>';
  renderQueue();
  updateNav();
}

function removeItem(id, e) {
  if (e) e.stopPropagation();
  const idx = queue.findIndex(q => q.id === id);
  if (idx === -1) return;
  if (activeId === id) {
    activeId = null;
    videoPlayer.style.display = 'none';
    videoPlayer.src = '';
    emptyState.style.display = '';
    videoLoading.className = 'video-loading';
    document.getElementById('nowPlaying').textContent = 'No video selected';
  }
  queue.splice(idx, 1);
  renderQueue();
  updateNav();
}

function clearQueue() {
  activeId = null;
  videoPlayer.style.display = 'none';
  videoPlayer.src = '';
  emptyState.style.display = '';
  videoLoading.className = 'video-loading';
  document.getElementById('nowPlaying').textContent = 'No video selected';
  queue.length = 0;
  renderQueue();
  updateNav();
}

function playNext() {
  const idx = queue.findIndex(q => q.id === activeId);
  if (idx < queue.length - 1) playItem(queue[idx + 1].id);
}

function playPrev() {
  const idx = queue.findIndex(q => q.id === activeId);
  if (idx > 0) playItem(queue[idx - 1].id);
}

function updateNav() {
  const idx = queue.findIndex(q => q.id === activeId);
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= queue.length - 1;
  document.getElementById('queueStats').textContent = queue.length + ' total';
}

function renderQueue() {
  const list = document.getElementById('queueList');
  list.innerHTML = queue.map(q => {
    const isActive = q.id === activeId;
    const icon = q.status === 'error' ? '❌' : (isActive ? '🔊' : '▶');
    const statusClass = isActive ? 'playing' : q.status;
    const meta = q.status === 'error' ? 'Failed' : (isActive ? 'Now playing' : 'Ready');
    return `
    <div class="queue-item ${isActive ? 'active' : ''} ${q.status}" onclick="playItem(${q.id})">
      <div class="q-status ${statusClass}">${icon}</div>
      <div class="q-info">
        <div class="q-name">${q.name}</div>
        <div class="q-meta">${meta}</div>
      </div>
      <button class="q-remove" onclick="removeItem(${q.id}, event)">×</button>
    </div>`;
  }).join('');
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); playNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); playPrev(); }
  if (e.code === 'Space') { e.preventDefault(); videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause(); }
  if (e.code === 'KeyF') { document.fullscreenElement ? document.exitFullscreen() : videoPlayer.requestFullscreen(); }
});

videoPlayer.addEventListener('ended', () => { playNext(); });
</script>

</body>
</html>
